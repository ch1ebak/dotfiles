# MANGO
listener {
    timeout = 250
    on-timeout = mmsg dispatch disable_monitor,eDP-2
    on-resume = mmsg dispatch enable_monitor,eDP-2; brightnessctl --device=intel_backlight -s set 40%
}

listener {
    timeout = 250
    on-timeout = mmsg dispatch disable_monitor,HDMI-A-1
    on-resume = mmsg dispatch enable_monitor,HDMI-A-1
}

listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
